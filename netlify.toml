# Netlify configuration for PANDA Learning Hub

[build]
  # No build command needed for static site
  publish = "."

[functions]
  # Directory containing Netlify Functions
  directory = "netlify/functions"
  # Use nft (Node File Tracing) bundler for better compatibility with
  # @netlify/blobs, which relies on Netlify's runtime context injection.
  # esbuild can strip runtime-injected environment detection code.
  node_bundler = "nft"
