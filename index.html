    <style>
        /* CSS Reset and Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.5;
            color: #ffffff;
            background: #13294B;
        }

        /* Accessibility: Focus styles for keyboard navigation */
        :focus-visible {
            outline: 2px solid var(--unc-blue, #4B9CD3);
            outline-offset: 2px;
        }

        /* Accessibility: Skip to content link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent-orange, #FF8C42);
            color: white;
            padding: 8px 16px;
            z-index: 10000;
            font-weight: 600;
            border-radius: 0 0 8px 0;
        }
        .skip-link:focus {
            top: 0;
        }

        /* Accessibility: Reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        :root {
            /* UNC Tar Heel Colors */
            --unc-navy: #13294B;
            --unc-blue: #4B9CD3;
            --unc-light-blue: #7BAFD4;
            --unc-orange: #F4A460;
            --unc-bright-orange: #FF8C42;
            
            /* Dark Theme Colors */
            --dark-bg: #0f1729;
            --dark-card: #1a2744;
            --dark-card-hover: #243352;
            --dark-border: #2d3f5f;
            --dark-text: #e2e8f0;
            --dark-text-muted: #94a3b8;
            
            /* Accent Colors */
            --accent-green: #10b981;
            --accent-teal: #14b8a6;
            --accent-pink: #ec4899;
            
            /* Legacy variables for compatibility */
            --panda-blue: #4B9CD3;
            --panda-orange: #FF8C42;
            --panda-light-blue: #7BAFD4;
            
            /* ===== NEW DESIGN SYSTEM (Phase 1) ===== */
            
            /* Background hierarchy */
            --bg-deep: #0B1120;
            --bg-primary: #111827;
            --bg-card: #1F2A42;
            --bg-elevated: #283549;
            
            /* Text hierarchy */
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-muted: #8B9CB8; /* Improved contrast from #64748B */
            
            /* Accent Orange (primary accent) */
            --accent-orange: #FF8C42;
            --accent-orange-bright: #FFA366;
            --accent-orange-glow: rgba(255, 140, 66, 0.25);
            
            /* Border colors */
            --border-default: #334155;
            --border-subtle: rgba(100, 116, 139, 0.3);
            --border-accent: rgba(255, 140, 66, 0.4);
            
            /* Border radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        /* Progress Ring Styles (Synthesis-inspired) */
        .progress-ring {

        /* Modern Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, var(--unc-blue) 0%, var(--unc-light-blue) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(75, 156, 211, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(75, 156, 211, 0.4);
        }
        
        .btn-orange {
            background: linear-gradient(135deg, var(--unc-orange) 0%, var(--unc-bright-orange) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.3);
        }
        
        .btn-orange:hover {

        .btn-ghost {
            background: transparent;
            color: var(--dark-text);
            border: 1px solid var(--dark-border);
            padding: 12px 24px;
            border-radius: 12px;

        /* ===== NEW COMPONENT STYLES (Phase 1) ===== */
        
        /* Glass Card - Modern frosted glass effect */
        .glass-card {
            background: rgba(31, 42, 66, 0.85);
            backdrop-filter: blur(16px);

            border: 1px solid rgba(100, 116, 139, 0.2);

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

            border-color: var(--border-accent);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }
        
        /* Primary Orange Button (new default accent) */
        .btn-accent {
            background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-bright) 100%);
            color: white;
            border: none;
            padding: 14px 28px;

            box-shadow: 0 8px 25px rgba(75, 156, 211, 0.4);
        }
        
        /* Ghost button with new styling */
        .btn-ghost-new {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-ghost-new:hover {
            background: var(--bg-elevated);
            border-color: var(--border-default);
            color: var(--text-primary);
        }
        
        /* Modern Input Styles */
        .dark-input {
            background: #0f1729;
            border: 2px solid #2d3f5f;

            width: 100%;

            outline: none;
            border-color: var(--unc-blue);

        .dark-input::placeholder {
            color: #64748b;
        }
        
        #participantIdInput::placeholder {
            color: #64748b;
            letter-spacing: 0.05em;

        .skill-circle {
            width: 120px;

            border-radius: 50%;

        .skill-circle.active {
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        
        .skill-circle.locked {
            opacity: 0.5;

        .skill-label {
            color: var(--dark-text-muted);

            margin-top: 12px;

        }

        .subject-circle {

        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        /* ===== NEW ANIMATIONS (Phase 1) ===== */
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 1s linear infinite; }
        
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-gentle-bounce { animation: gentle-bounce 2s ease-in-out infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes sound-wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.5); }
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .animate-pulse-ring { animation: pulse-ring 1.5s ease-out infinite; }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-orange-glow); }
            50% { box-shadow: 0 0 40px var(--accent-orange-glow); }
        }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }

        /* Progress Pill Container */

        }

        .std-pill-circle {

            width: 130px;
            height: 130px;

        }

        .std-pill-icon {

            margin-top: 4px;
        }

        .std-pill-bar {

            height: 4px;
            background: rgba(100, 116, 139, 0.3);
            border-radius: 2px;
            overflow: hidden;
            margin: 8px auto 0;

            transition: width 0.3s ease;
        }
        .std-pill-bar-fill.complete {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        /* Complete Checkmark */
        .std-pill-check {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            width: 24px;

            justify-content: center;
            font-size: 0.75rem;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.4);

            PARTICIPATION_CODE: 'pandaParticipationCode',
            APP_STATE: 'pandaAppState',
            // BEGIN NAVIGATION PERSISTENCE
            NAV_STATE: 'pandaNavState' // For storing currentView, activeChildId, currentSubject
            // END NAVIGATION PERSISTENCE
        };

        // Save consent and participation code to localStorage
        function saveConsentToStorage() {
            try {
                localStorage.setItem(STORAGE_KEYS.CONSENT_GIVEN, state.consentGiven ? 'true' : 'false');
                if (state.participantId) {
                    localStorage.setItem(STORAGE_KEYS.PARTICIPATION_CODE, state.participantId);
                }
            } catch (e) {
                console.warn('PANDA: Could not save consent to localStorage', e);
            }
        }

        // Save app state (children, learningData, assessments) to localStorage
        // Also triggers server sync for cross-device persistence
        function saveAppStateToStorage() {
            try {
                const persistentState = {
                    children: state.children,
                    learningData: state.learningData,
                    journalEntries: state.journalEntries,
                    // BEGIN REPEAT MASTERY COUNTS
                    repeatMasteries: state.repeatMasteries
                    // END REPEAT MASTERY COUNTS
                };
                localStorage.setItem(STORAGE_KEYS.APP_STATE, JSON.stringify(persistentState));

                // BEGIN CROSS-DEVICE SYNC
                // Also sync to server (non-blocking, fire-and-forget)
                syncAppStateToServer();
                // END CROSS-DEVICE SYNC
            } catch (e) {
                console.warn('PANDA: Could not save app state to localStorage', e);
            }
        }

        // Load app state from localStorage and merge into state
        function loadAppStateFromStorage() {
            try {
                const savedState = localStorage.getItem(STORAGE_KEYS.APP_STATE);
                if (savedState) {
                    const parsed = JSON.parse(savedState);

                    // Validate and merge children array
                    if (Array.isArray(parsed.children)) {
                        state.children = parsed.children;
                    }

                    // Validate and merge learningData object
                    if (parsed.learningData && typeof parsed.learningData === 'object') {
                        state.learningData = parsed.learningData;
                    }

                    // Validate and merge journal entries
                    if (Array.isArray(parsed.journalEntries)) {
                        state.journalEntries = parsed.journalEntries;
                    }

                    // BEGIN REPEAT MASTERY COUNTS
                    // Validate and merge repeatMasteries object
                    if (parsed.repeatMasteries && typeof parsed.repeatMasteries === 'object') {
                        state.repeatMasteries = parsed.repeatMasteries;
                    }
                    // END REPEAT MASTERY COUNTS

                    // BEGIN FIX FOR BLANK SCREEN
                    // Ensure learning data exists for all children (handles old/corrupted data)
                    state.children.forEach(child => {
                        if (child && child.id) {
                            ensureLearningDataForChild(child.id);
                            ensureRepeatMasteriesForChild(child.id);
                        }
                    });

                    // Ensure funPracticeSession is always initialized
                    ensureFunPracticeSession();

                    // Ensure subjectPracticeMode has a default
                    if (!state.subjectPracticeMode) {
                        state.subjectPracticeMode = 'normal';
                    }
                    // END FIX FOR BLANK SCREEN

                    // Set first child as selected if exists
                    if (state.children.length > 0) {
                        state.selectedChildForProgress = state.children[0].id;
                    }
                }
            } catch (e) {
                console.warn('PANDA: Could not load app state from localStorage', e);
                // Fall back to defaults (already set in state)
            }
        }

        // Check if user has already completed consent/code entry
        function loadConsentFromStorage() {
            try {
                const consentGiven = localStorage.getItem(STORAGE_KEYS.CONSENT_GIVEN);
                const participationCode = localStorage.getItem(STORAGE_KEYS.PARTICIPATION_CODE);

                if (consentGiven === 'true' && participationCode && participationCode.length > 0) {
                    // Restore consent and participation state
                    state.consentGiven = true;
                    state.participantId = participationCode;
                    state.userId = `PANDA_${participationCode}_restored`;

                    // Load saved app state (children, progress, etc.)
                    loadAppStateFromStorage();

                    // Skip to role selection (audio setup is not re-required)
                    state.audioSetup.setupComplete = true;

                    // BEGIN NAVIGATION PERSISTENCE - Restore last view on reload
                    // Try to restore navigation state (currentView, activeChildId, currentSubject)
                    const restoredView = loadNavStateFromStorage();
                    if (!restoredView) {
                        // Fallback to role selection if no valid nav state
                        state.currentView = 'roleSelection';
                    }
                    // END NAVIGATION PERSISTENCE

                    return true; // Consent was restored
                }
            } catch (e) {
                console.warn('PANDA: Could not load consent from localStorage', e);
            }
            return false; // No saved consent, show normal flow
        }

        // ============================================================================
        // BEGIN NAVIGATION PERSISTENCE - Save/restore view state for refresh
        // ============================================================================

        // Save navigation state (view, activeChildId, currentSubject) to localStorage
        function saveNavStateToStorage() {
            try {
                // Only save meaningful views that we want to restore on refresh
                const restorableViews = ['roleSelection', 'parentDashboard', 'childManagement', 'childLearning', 'assessment'];
                if (!restorableViews.includes(state.currentView)) {
                    return; // Don't save intermediate/setup views
                }

                const navState = {
                    currentView: state.currentView,
                    activeChildId: state.activeChildId,
                    currentSubject: state.currentSubject,
                    selectedChildForProgress: state.selectedChildForProgress
                };
                localStorage.setItem(STORAGE_KEYS.NAV_STATE, JSON.stringify(navState));
            } catch (e) {
                console.warn('PANDA: Could not save nav state to localStorage', e);
            }
        }

        // Load navigation state from localStorage - returns true if state was restored
        function loadNavStateFromStorage() {
            try {
                const savedNav = localStorage.getItem(STORAGE_KEYS.NAV_STATE);
                if (!savedNav) return false;

                const navState = JSON.parse(savedNav);

                // Validate the saved view is still valid
                const restorableViews = ['roleSelection', 'parentDashboard', 'childManagement', 'childLearning', 'assessment'];
                if (!navState.currentView || !restorableViews.includes(navState.currentView)) {
                    return false;
                }

                // For views that require an active child, validate child still exists
                const childRequiredViews = ['childLearning', 'assessment'];
                if (childRequiredViews.includes(navState.currentView)) {
                    if (!navState.activeChildId) return false;
                    const childExists = state.children.some(c => c.id === navState.activeChildId);
                    if (!childExists) {
                        // Child was deleted, fall back to childManagement
                        state.currentView = 'childManagement';
                        return true;
                    }
                }

                // Restore the navigation state
                state.currentView = navState.currentView;
                if (navState.activeChildId) {
                    state.activeChildId = navState.activeChildId;
                }
                if (navState.currentSubject) {
                    state.currentSubject = navState.currentSubject;
                }
                if (navState.selectedChildForProgress) {
                    state.selectedChildForProgress = navState.selectedChildForProgress;
                }

                console.log('PANDA: Restored navigation state:', navState.currentView);
                return true;
            } catch (e) {
                console.warn('PANDA: Could not load nav state from localStorage', e);
                return false;
            }
        }

        // END NAVIGATION PERSISTENCE

        // ============================================================================
        // BEGIN CROSS-DEVICE SYNC - Server-side state persistence
        // ============================================================================

        // Load state from server for the given participant ID
        // This function is async and should be called after loadConsentFromStorage()
        // to merge server state into local state (server state takes precedence)
        async function loadServerStateForParticipant(participantId) {
            if (!participantId) {
                console.log('PANDA: No participantId, skipping server sync');
                return;
            }

            try {
                console.log('PANDA: Fetching state from server for participant:', participantId);
                const res = await fetch('/.netlify/functions/state?participantId=' + encodeURIComponent(participantId));

                if (!res.ok) {
                    // HTTP error (502, 503, 500 …) — log detail and show a friendly warning.
                    // Audio and local state continue to work normally.
                    console.warn('PANDA: State sync HTTP error', res.status, res.statusText);
                    state.serverSyncFailed = true;
                    showSyncWarning('Cross-device sync is temporarily unavailable (server error ' + res.status + '). Your local progress is safe.');
                    return;
                }

                const data = await res.json();

                if (data.success && data.state) {
                    console.log('PANDA: Server state found, merging into local state');

                    // Merge server state into local app state (server is canonical)
                    if (Array.isArray(data.state.children)) {
                        state.children = data.state.children;
                    }
                    if (typeof data.state.learningData === 'object' && data.state.learningData !== null) {
                        state.learningData = data.state.learningData;
                    }
                    if (Array.isArray(data.state.journalEntries)) {
                        state.journalEntries = data.state.journalEntries;
                    }
                    if (typeof data.state.repeatMasteries === 'object' && data.state.repeatMasteries !== null) {
                        state.repeatMasteries = data.state.repeatMasteries;
                    }

                    // Ensure learning data exists for all children (handles any inconsistencies)
                    state.children.forEach(child => {
                        if (child && child.id) {
                            ensureLearningDataForChild(child.id);
                            ensureRepeatMasteriesForChild(child.id);
                        }
                    });

                    // Ensure funPracticeSession is always initialized
                    ensureFunPracticeSession();

                    // Set first child as selected if exists
                    if (state.children.length > 0 && !state.selectedChildForProgress) {
                        state.selectedChildForProgress = state.children[0].id;
                    }

                    // Also write this to localStorage as backup
                    saveAppStateToStorage();

                    // Re-render to show updated data
                    render();

                    console.log('PANDA: Server state merged successfully, updatedAt:', data.updatedAt);
                } else {
                    console.log('PANDA: No server state found, checking if we need to push local state');
                    // No server state yet; if we have local state, push it up
                    const hasLocalData = state.children.length > 0 ||
                                        Object.keys(state.learningData).length > 0 ||
                                        state.journalEntries.length > 0 ||
                                        Object.keys(state.repeatMasteries).length > 0;

                    if (hasLocalData) {
                        console.log('PANDA: Local state exists, syncing to server');
                        syncAppStateToServer();
                    }
                }
            } catch (e) {
                console.warn('PANDA: Could not load server state, falling back to local only:', e.message);
                // Network failure or JSON parse error — show a non-blocking warning.
                state.serverSyncFailed = true;
                showSyncWarning('Cross-device sync is unavailable right now. Your local progress is safe and audio will still work.');
                // App continues with localStorage data - no blocking
            }
        }

        // Show a dismissible, non-blocking sync-warning banner at the top of the page.
        // Safe to call multiple times — only creates one banner.
        function showSyncWarning(message) {
            if (document.getElementById('panda-sync-warning')) return; // already shown
            const banner = document.createElement('div');
            banner.id = 'panda-sync-warning';
            banner.setAttribute('role', 'alert');
            banner.style.cssText = [
                'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:99999',
                'background:#f59e0b', 'color:#1c1917', 'font-size:13px',
                'padding:8px 40px 8px 16px', 'text-align:center',
                'font-family:sans-serif', 'box-shadow:0 2px 6px rgba(0,0,0,.3)'
            ].join(';');
            banner.textContent = '⚠️ ' + message;
            // Dismiss button
            const btn = document.createElement('button');
            btn.textContent = '✕';
            btn.setAttribute('aria-label', 'Dismiss');
            btn.style.cssText = [
                'position:absolute', 'right:10px', 'top:50%', 'transform:translateY(-50%)',
                'background:none', 'border:none', 'cursor:pointer',
                'font-size:16px', 'color:#1c1917', 'padding:0 4px'
            ].join(';');
            btn.onclick = function() { banner.remove(); };
            banner.appendChild(btn);
            document.body.insertBefore(banner, document.body.firstChild);
        }

        // Sync app state to server (non-blocking, fire-and-forget with warning on failure)
        async function syncAppStateToServer() {
            if (!state.participantId) {
                return; // No participant ID, cannot sync
            }

            const persistentState = {
                children: state.children,
                learningData: state.learningData,
                journalEntries: state.journalEntries,
                repeatMasteries: state.repeatMasteries
            };

            try {
                console.log('PANDA: Syncing state to server for participant:', state.participantId);
                const res = await fetch('/.netlify/functions/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        participantId: state.participantId,
                        state: persistentState,
                        updatedAt: new Date().toISOString()
                    })
                });

                if (!res.ok) {
                    console.warn('PANDA: State POST HTTP error', res.status, res.statusText);
                    if (!state.serverSyncFailed) {
                        state.serverSyncFailed = true;
                        showSyncWarning('Cross-device sync is temporarily unavailable. Your local progress is safe.');
                    }
                    return;
                }

                const data = await res.json();
                if (data.success) {
                    console.log('PANDA: State synced to server successfully');
                } else {
                    console.warn('PANDA: Server sync returned error:', data.error);
                }
            } catch (e) {
                console.warn('PANDA: Could not sync to server (will retry on next save):', e.message);
            }
        }

        // Get mastery status for a subject: { mastered, total, percentage, isComplete }
        function getSubjectMasteryStatus(childId, subject) {
            if (!state.learningData[childId] || !state.learningData[childId][subject]) {
                return { mastered: 0, total: 0, percentage: 0, isComplete: false };
            }
            const subjectData = state.learningData[childId][subject];
            let mastered = 0, total = 0;
            Object.keys(subjectData).forEach(item => {
                total++;
                if (subjectData[item].mastered) mastered++;
            });
            const percentage = total > 0 ? Math.round((mastered / total) * 100) : 0;
            return { mastered, total, percentage, isComplete: mastered === total && total > 0 };
        }

        // Get mastery status for all subjects for a child
        function getAllSubjectsMasteryStatus(childId) {
            const subjects = ['colors', 'shapes', 'numbers'];
            return subjects.map(subject => ({
                subject,
                name: curriculum[subject]?.name || subject,
                ...getSubjectMasteryStatus(childId, subject)
            }));
        }

        // TTS request ID: incremented on every new speakText/speakPanda call AND on
        // stopAllSpeech. Any pending async fetch that returns after the ID changes is
        // discarded, preventing stale audio from playing over a newer request.
        let ttsRequestId = 0;

        // Debounce guard: prevents voice + click both firing selectSubject()
        let lastCategoryAcceptTime = 0;

        // DEBUG_MODE flag for voice sync debugging
        const DEBUG_MODE = false;

        function stopAllSpeech() {
            // Invalidate any in-flight async TTS fetch so it won't play when it resolves
            ttsRequestId++;

            // Stop ElevenLabs audio playback
            if (currentPandaAudio) {
                currentPandaAudio.pause();
                currentPandaAudio.currentTime = 0;
                currentPandaAudio.src = '';
                currentPandaAudio = null;
            }
            // Also stop any legacy speechSynthesis (fallback)
            if (window.speechSynthesis) {

                elevenLabsSTT.isRecording = false;

        // ============================================================================
        // ELEVENLABS SPEECH-TO-TEXT MODULE
        // For toddler voice interaction (yes/no and option selection)
        // Uses ElevenLabs STT API via Netlify function for better accuracy
        // ============================================================================

        // State for ElevenLabs STT
        const elevenLabsSTT = {
            mediaRecorder: null,
            audioChunks: [],
            isRecording: false,
            recordingTimeout: null,
            currentMode: null, // 'yesNo' or 'option'
            onResult: null,    // Callback for result
            stream: null       // MediaStream reference
        };

        // YES/NO interpretation patterns (for toddler speech)
        const YES_PATTERNS = [
          'yes', 'yeah', 'yep', 'yup',
          'ready', "i'm ready", 'im ready',
          'ok', 'okay', 'sure',
          'uh huh', 'uh-huh',
          'go'
        ];

        const NO_PATTERNS = [
          'no', 'nope', 'nah',
          'not yet',
          'wait',
          "i'm not ready", 'im not ready',
          'not ready',
          "i don't know", 'i dont know',
          'maybe later'
        ];

        // Fuzzy match dictionary for toddler speech patterns
        const FUZZY_MATCH = {
            'y': 'yes', 'ye': 'yes', 'ya': 'yes', 'yeah': 'yes', 'yea': 'yes',
            'n': 'no', 'na': 'no', 'nah': 'no', 'nope': 'no',
            'mm': 'yes', 'mmhm': 'yes', 'uhhuh': 'yes', 'uh huh': 'yes',
            'mhm': 'yes', 'mmm': 'yes', 'da': 'yes', 'dah': 'yes'
        };

        // OPTION interpretation patterns (for multiple choice)
        const OPTION_PATTERNS = {
            0: ['one', '1', 'option one', 'option 1', 'first one', 'first', 'the first'],
            1: ['two', '2', 'option two', 'option 2', 'second one', 'second', 'the second'],
            2: ['three', '3', 'option three', 'option 3', 'third one', 'third', 'the third']
        };

        /**
         * Interpret a transcript for yes/no responses
         * Enhanced with fuzzy matching for toddler speech patterns
         * Returns: 'yes', 'no', 'unclear', or 'unavailable'
         */
        function interpretYesNo(transcript) {
            if (!transcript || typeof transcript !== 'string') return 'unavailable';

            // Clean up transcript for fuzzy matching
            let clean = transcript.toLowerCase().replace(/[.!?,]/g, '').trim();
            if (!clean) return 'unclear';

            // Check fuzzy matches FIRST (for toddler speech)
            for (let [fuzzy, intent] of Object.entries(FUZZY_MATCH)) {
                if (clean === fuzzy || clean.includes(fuzzy)) {
                    console.log('🎤 ElevenLabs STT: Fuzzy matched "' + fuzzy + '" as ' + intent.toUpperCase() + ' from:', transcript);
                    return intent;
                }
            }

            // Check for YES patterns
            for (const pattern of YES_PATTERNS) {
                if (clean.includes(pattern)) {
                    console.log('🎤 ElevenLabs STT: Interpreted as YES from:', transcript);
                    return 'yes';
                }
            }

            // Check for NO patterns
            for (const pattern of NO_PATTERNS) {
                if (clean.includes(pattern)) {
                    console.log('🎤 ElevenLabs STT: Interpreted as NO from:', transcript);
                    return 'no';
                }
            }

            console.log('🎤 ElevenLabs STT: Could not interpret yes/no from:', transcript);
            return 'unclear';
        }

        /**
         * Interpret a transcript for option selection (1, 2, or 3)
         * Returns: 0, 1, 2 (option index), 'unclear', or 'unavailable'
         */
        function interpretOption(transcript) {
            if (!transcript || typeof transcript !== 'string') return 'unavailable';

            const lowerTranscript = transcript.toLowerCase().trim();
            if (!lowerTranscript) return 'unclear';

            // Check each option's patterns
            for (const [optionIndex, patterns] of Object.entries(OPTION_PATTERNS)) {
                for (const pattern of patterns) {
                    if (lowerTranscript.includes(pattern)) {
                        console.log(`🎤 ElevenLabs STT: Interpreted as Option ${parseInt(optionIndex) + 1} from:`, transcript);
                        return parseInt(optionIndex);
                    }
                }
            }

            console.log('🎤 ElevenLabs STT: Could not interpret option from:', transcript);
            return 'unclear';
        }

        /**
         * Send audio to ElevenLabs STT Netlify function
         * Returns the transcript string or null on error
         */
        async function sendToElevenLabsSTT(audioBlob) {
            try {
                // Convert blob to base64
                const arrayBuffer = await audioBlob.arrayBuffer();
                const base64Audio = btoa(
                    new Uint8Array(arrayBuffer).reduce((data, byte) => data + String.fromCharCode(byte), '')
                );

                const response = await fetch('/.netlify/functions/elevenlabs-stt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        audio: base64Audio,
                        contentType: audioBlob.type || 'audio/webm'
                    })
                });

                if (!response.ok) {
                    console.error('🎤 ElevenLabs STT: API error', response.status);
                    return null;
                }

                const data = await response.json();
                console.log('🎤 ElevenLabs STT: Received transcript:', data.transcript);
                return data.transcript || '';

            } catch (error) {
                console.error('🎤 ElevenLabs STT: Error sending audio:', error);
                return null;
            }
        }

        /**
         * Stop any active ElevenLabs STT recording
         */
        function stopElevenLabsSTT() {
            if (elevenLabsSTT.recordingTimeout) {
                clearTimeout(elevenLabsSTT.recordingTimeout);
                elevenLabsSTT.recordingTimeout = null;
            }

            if (elevenLabsSTT.mediaRecorder && elevenLabsSTT.isRecording) {
                try {
                    elevenLabsSTT.mediaRecorder.stop();
                } catch (e) {
                    console.log('🎤 ElevenLabs STT: Could not stop recorder:', e);
                }
            }

            if (elevenLabsSTT.stream) {
                elevenLabsSTT.stream.getTracks().forEach(track => track.stop());
                elevenLabsSTT.stream = null;
            }

            elevenLabsSTT.isRecording = false;
            elevenLabsSTT.audioChunks = [];
        }

        /**
         * Start listening with ElevenLabs STT
         * @param {string} mode - 'yesNo' or 'option'
         * @param {function} onResult - Callback with result: { interpretation: string|number, transcript: string }
         * @param {number} durationMs - Recording duration in ms (default: 2000 for yesNo, 2500 for option)
         */
        async function startElevenLabsSTT(mode, onResult, durationMs = null) {
            // Set default duration based on mode
            if (durationMs === null) {
                durationMs = mode === 'yesNo' ? 2000 : 2500;
            }

            // Stop any existing recording
            stopElevenLabsSTT();

            // Check for microphone permission
            if (!state.audioSetup.microphoneEnabled) {
                console.log('🎤 ElevenLabs STT: Microphone not enabled');
                if (onResult) onResult({ interpretation: 'unavailable', transcript: '' });
                return;
            }

            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                elevenLabsSTT.stream = stream;
                elevenLabsSTT.audioChunks = [];
                elevenLabsSTT.currentMode = mode;
                elevenLabsSTT.onResult = onResult;

                // Determine supported MIME type
                let mimeType = 'audio/webm';
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    mimeType = 'audio/webm;codecs=opus';
                } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
                    mimeType = 'audio/mp4';
                } else if (MediaRecorder.isTypeSupported('audio/ogg')) {
                    mimeType = 'audio/ogg';
                }

                const mediaRecorder = new MediaRecorder(stream, { mimeType });
                elevenLabsSTT.mediaRecorder = mediaRecorder;

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        elevenLabsSTT.audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    elevenLabsSTT.isRecording = false;

                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());
                    elevenLabsSTT.stream = null;

                    // Create audio blob
                    const audioBlob = new Blob(elevenLabsSTT.audioChunks, { type: mimeType });
                    elevenLabsSTT.audioChunks = [];

                    // Check if we have audio data
                    if (audioBlob.size < 100) {
                        console.log('🎤 ElevenLabs STT: Audio too short, returning unavailable');
                        if (elevenLabsSTT.onResult) {
                            elevenLabsSTT.onResult({ interpretation: 'unavailable', transcript: '' });
                        }
                        return;
                    }

                    // Send to ElevenLabs STT
                    const transcript = await sendToElevenLabsSTT(audioBlob);

                    if (transcript === null) {
                        // API error
                        if (elevenLabsSTT.onResult) {
                            elevenLabsSTT.onResult({ interpretation: 'unavailable', transcript: '' });
                        }
                        return;
                    }

                    // Interpret based on mode
                    let interpretation;
                    if (elevenLabsSTT.currentMode === 'yesNo') {
                        interpretation = interpretYesNo(transcript);
                    } else if (elevenLabsSTT.currentMode === 'option') {
                        interpretation = interpretOption(transcript);
                    } else {
                        interpretation = 'unclear';
                    }

                    // Call the result callback
                    if (elevenLabsSTT.onResult) {
                        elevenLabsSTT.onResult({ interpretation, transcript });
                    }
                };

                mediaRecorder.onerror = (event) => {
                    console.error('🎤 ElevenLabs STT: MediaRecorder error:', event.error);
                    stopElevenLabsSTT();
                    if (elevenLabsSTT.onResult) {
                        elevenLabsSTT.onResult({ interpretation: 'unavailable', transcript: '' });
                    }
                };

                // Start recording
                mediaRecorder.start();
                elevenLabsSTT.isRecording = true;
                console.log(`🎤 ElevenLabs STT: Started recording (${mode} mode, ${durationMs}ms)`);

                // Auto-stop after duration
                elevenLabsSTT.recordingTimeout = setTimeout(() => {
                    if (elevenLabsSTT.mediaRecorder && elevenLabsSTT.isRecording) {
                        console.log('🎤 ElevenLabs STT: Stopping recording after timeout');
                        elevenLabsSTT.mediaRecorder.stop();
                    }
                }, durationMs);

            } catch (error) {
                console.error('🎤 ElevenLabs STT: Error accessing microphone:', error);
                if (onResult) onResult({ interpretation: 'unavailable', transcript: '' });
            }
        }

        /**
         * Check if ElevenLabs STT is currently recording
         */
        function isElevenLabsSTTRecording() {
            return elevenLabsSTT.isRecording;
        }

        /**
         * Hard stop all microphone activity - call when user disables voice,
         * leaves activity views, or app goes to background
         */
        function hardStopAllMicActivity() {
            console.log('🎤 PANDA: hardStopAllMicActivity called');

            // Stop ElevenLabs STT
            if (typeof stopElevenLabsSTT === 'function') {
                try { stopElevenLabsSTT(); } catch (e) {
                    console.log('🎤 PANDA: Error stopping ElevenLabs STT:', e);
                }
            }

            // Stop any Web Speech Recognition (legacy fallback)
            try {
                if (window.recognition && typeof window.recognition.stop === 'function') {
                    window.recognition.stop();
                }
            } catch (e) {
                console.log('🎤 PANDA: Error stopping Web Speech Recognition:', e);
            }

            // Close any live getUserMedia stream
            if (elevenLabsSTT && elevenLabsSTT.stream) {
                try {
                    elevenLabsSTT.stream.getTracks().forEach(t => t.stop());
                } catch (e) {
                    console.log('🎤 PANDA: Error stopping stream tracks:', e);
                }
                elevenLabsSTT.stream = null;
            }

            // Clean up ElevenLabs STT state
            if (elevenLabsSTT) {
                elevenLabsSTT.isRecording = false;
                if (elevenLabsSTT.mediaRecorder) {
                    try { elevenLabsSTT.mediaRecorder.stop(); } catch (e) {}
                    elevenLabsSTT.mediaRecorder = null;
                }
                if (elevenLabsSTT.recordingTimeout) {
                    clearTimeout(elevenLabsSTT.recordingTimeout);
                    elevenLabsSTT.recordingTimeout = null;
                }
            }

            // Reset global mic state
            state.micActive = false;
            state.isListening = false;

            // Also reset activity-specific listening states
            if (state.colorQuest) {
                state.colorQuest.listening = false;
            }
            if (state.learningIntro) {
                state.learningIntro.listening = false;
            }
        }

        /**
         * Check if microphone is actually active (recording)
         */
        function isMicActuallyActive() {
            return !!(
                (elevenLabsSTT && elevenLabsSTT.isRecording) ||
                (elevenLabsSTT && elevenLabsSTT.stream) ||
                state.micActive
            );
        }

        /**
         * Central wrapper to start listening - ensures voice is enabled
         * and tracks mic state properly
         * @param {string} mode - 'yesNo' or 'option'
         * @param {function} onResult - Callback with result
         * @param {number} durationMs - Recording duration in ms
         */
        async function startListening(mode, onResult, durationMs) {
            // Check if voice/mic is enabled
            if (!state.voiceEnabled || !state.audioSetup.microphoneEnabled) {
                console.log('🎤 PANDA: Voice disabled, not starting mic.');
                if (onResult) onResult({ interpretation: 'unavailable', transcript: '' });
                return;
            }

            // If somehow already active, stop first
            hardStopAllMicActivity();

            // Set mic active state
            state.micActive = true;
            state.isListening = true;

            // Call existing startElevenLabsSTT with given mode
            await startElevenLabsSTT(mode, (result) => {
                // Reset mic state when recording finishes
                state.micActive = false;
                state.isListening = false;
                if (onResult) onResult(result);
            }, durationMs);
        }

        /**
         * Central wrapper to stop listening
         */
        function stopListening() {
            hardStopAllMicActivity();
        }

        function speakText(text) {
            if (!state.voiceEnabled) return;

            // Capture the current request ID; any previous pending fetch is now stale
            const myTtsId = ++ttsRequestId;

            // Stop any currently playing audio
            if (currentPandaAudio) {
                currentPandaAudio.pause();
                currentPandaAudio.currentTime = 0;
                currentPandaAudio.src = '';
                currentPandaAudio = null;
            }

            console.log('🐼 PANDA Voice (ElevenLabs): Speaking:', text.substring(0, 50) + (text.length > 50 ? '...' : ''));

            // Call ElevenLabs TTS via Netlify function
            fetch('/.netlify/functions/elevenlabs-tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('TTS request failed: ' + response.status);
                }
                return response.blob();
            })
            .then(blob => {
                // Discard if a newer TTS request (or stopAllSpeech) happened while fetching
                if (myTtsId !== ttsRequestId) {
                    return; // Blob is in-memory and will be GC'd; nothing to revoke yet
                }
                const audioUrl = URL.createObjectURL(blob);
                currentPandaAudio = new Audio(audioUrl);
                currentPandaAudio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    currentPandaAudio = null;
                };
                currentPandaAudio.onerror = () => {
                    console.error('🐼 Audio playback error');
                    URL.revokeObjectURL(audioUrl);
                    currentPandaAudio = null;
                };
                currentPandaAudio.play().catch(err => {
                    console.error('🐼 Audio play failed:', err.message);
                });
            })
            .catch(err => {
                console.error('🐼 ElevenLabs TTS error:', err.message);
            });
        }

        /**
         * Safe wrapper for speakText that stops all overlapping speech first
         * Use this instead of speakText() directly to prevent TTS/STT overlaps
         */
        async function speakTextSafely(text) {
            stopAllSpeech(); // Kill overlaps FIRST
            await speakText(text); // Existing TTS function
        }

        function speakPrompt(promptType) {
            const subject = state.currentSubject;

            if (!state.activeChildId || !subject) return;

            if (!teachingGuides[subject] || !teachingGuides[subject].prompts[item]) return;
            
            const prompts = teachingGuides[subject].prompts[item];
            let textToSpeak = '';
            
            switch(promptType) {
                case 'show':
                    textToSpeak = prompts.show;
                    break;
                case 'say':
                    textToSpeak = prompts.say;
                    break;
                case 'practice':
                    textToSpeak = prompts.practice;
                    break;
                case 'tips':
                    textToSpeak = prompts.tips;
                    break;

            speakTextSafely(textToSpeak);
        }

        function startVoiceRecognition() {
            if (!state.voiceEnabled) {
                showAppToast('Please turn on Voice first by clicking the "Voice On" button.', 'warning');
                return;
            }

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showAppModal('Browser Not Supported', 'Voice recognition needs Chrome, Edge, or Safari browser.\n\nYour browser doesn\'t support voice commands, but you can still use the buttons!', 'warning');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                state.isListening = true;
                speakTextSafely("I'm listening. You can say 'yes', 'no', 'not yet', 'help', or 'next'.");
                render();
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                console.log('Heard:', transcript);
                handleVoiceCommand(transcript);
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                state.isListening = false;
                if (event.error === 'no-speech') {
                    speakTextSafely("I didn't hear anything. Try again!");
                } else if (event.error === 'not-allowed') {
                    showAppModal('Microphone Access Needed', 'Microphone permission denied.\n\nPlease allow microphone access in your browser settings.', 'warning');
                }
                render();
            };

            recognition.onend = function() {
                state.isListening = false;
                render();
            };

            try {
                recognition.start();
            } catch (e) {
                console.error('Failed to start recognition:', e);
                showAppToast('Could not start voice recognition. Please try again.', 'error');
                state.isListening = false;
                render();
            }
        }

        function handleVoiceCommand(transcriptRaw) {
          // Normalize transcript
          const transcript = (transcriptRaw || '').toLowerCase().trim();
          console.log('Voice command:', transcript);

          if (!transcript) {
            speakTextSafely("I didn't hear anything. You can say 'help', 'next', 'yes', or 'no'.");
            return;
          }

          // Helper to reuse ElevenLabs YES/NO patterns
          const matchesPattern = (patterns) => {
            if (!Array.isArray(patterns)) return false;
            return patterns.some(pattern => transcript.includes(pattern));
          };

          // 1. Help requests
          if (transcript.includes('help') || transcript.includes('hint') || transcript.includes('what do i say')) {
            const subject = state.currentSubject;
            const item = state.currentLesson || (
              state.activeChildId &&
              state.learningData[state.activeChildId] &&
              state.learningData[state.activeChildId][subject]
                ? Object.keys(state.learningData[state.activeChildId][subject])[0]
                : null
            );

            if (subject && item && teachingGuides[subject] && teachingGuides[subject].prompts[item]) {
              speakTextSafely(teachingGuides[subject].prompts[item].tips);
            } else {
              speakTextSafely("You can try saying 'yes', 'no', 'next', or 'help'.");
            }
            return;
          }

          // 2. Navigation
          if (transcript.includes('next') || transcript.includes('skip')) {
            speakTextSafely("Okay, let's move to the next one.");
            // Treat as an incorrect/skip so the system advances
            checkAnswer(false);
            return;
          }

          // 3. Correct / "yes" intents
          // Use both explicit words and ElevenLabs YES_PATTERNS
          const isYesIntent =
            transcript.includes('correct') ||
            transcript.includes('right') ||
            transcript.includes('yes') ||
            matchesPattern(typeof YES_PATTERNS !== 'undefined' ? YES_PATTERNS : []);

          if (isYesIntent) {
            checkAnswer(true);
            return;
          }

          // 4. Incorrect / "no / not yet / I don't know" intents
          const isNoIntent =
            transcript.includes('wrong') ||
            transcript.includes('incorrect') ||
            transcript.includes('no') ||
            transcript.includes('not yet') ||
            transcript.includes("i'm not ready") ||
            transcript.includes('im not ready') ||
            transcript.includes("i don't know") ||
            transcript.includes('i dont know') ||
            matchesPattern(typeof NO_PATTERNS !== 'undefined' ? NO_PATTERNS : []);

          if (isNoIntent) {
            checkAnswer(false);
            return;
          }

          // 5. Fallback
          speakTextSafely("I didn't understand that. You can say 'yes', 'no', 'not yet', 'help', or 'next'.");
        }

                practicalTip: "Catch your child doing things right! 'You said blue - that's amazing!' Give specific praise immediately after correct responses. You can also use negative reinforcement: 'Great job! Since you worked so hard, we can stop practicing and play now.' Both approaches strengthen learning through the brain's natural reward system."
            },
            {
                day: 14,
                title: "Pavlovian Conditioning: Creating Positive Learning Associations",
                content: "Classical (Pavlovian) conditioning occurs when the brain learns to associate two things that occur together. Just as Pavlov's dogs learned to salivate at a bell, your child's brain naturally creates associations between learning activities and the emotions experienced during them. When learning is paired with warmth, fun, and connection, the amygdala encodes positive emotional memories. These associations make your child eager to learn because the brain anticipates pleasure.",
                practicalTip: "Make learning time special: use a cozy spot, smile warmly, maybe play soft music. Soon your child will feel happy just starting the routine! Say 'It's learning time!' with excitement. The positive emotions become automatically linked to learning itself, creating a child who loves to learn."
            },
            {
                day: 15,
                title: "Protecting the Visual Brain: Screen Time and Developing Eyes",
                content: "The occipital lobe at the back of the brain processes all visual information and continues developing throughout early childhood. Excessive screen time, especially with bright, rapidly changing images, can overstimulate this developing region. The blue light from screens can also disrupt melatonin production and sleep patterns. Real-world visual experiences - natural lighting, depth perception, varied distances - provide the optimal input for healthy visual cortex development.",
                practicalTip: "Prioritize real objects over screens for learning. When using the PANDA app, keep sessions brief and take breaks to look at real objects: 'We learned about red - now let's find something red in our room!' This protects developing visual pathways while reinforcing learning with real-world experiences."
            },
            {
                day: 16,
                title: "The Power of Modeling: Children Learn What They See",
                content: "Mirror neurons in the brain fire both when we perform an action AND when we watch someone else perform it. This neural mirroring system is the foundation of observational learning. When you model behaviors - speaking clearly, showing curiosity, handling frustration calmly - your child's brain is literally practicing along with you. The premotor cortex and inferior frontal gyrus activate as if your child were doing the action themselves.",
                practicalTip: "Model everything you want to teach. Show enthusiasm when learning: 'Wow, look at this red apple! Red is my favorite!' Demonstrate how to handle mistakes: 'Oops, that wasn't right - let me try again!' Your child's mirror neurons are absorbing every behavior you display, making you their most powerful teacher."
            },
            {
                day: 17,
                title: "Imitation and Emulation: Two Paths to Learning",
                content: "Imitation means copying exactly what someone does, while emulation means achieving the same goal through your own method. Both involve the mirror neuron system, but emulation also engages the prefrontal cortex for problem-solving. Young children naturally progress from exact imitation to creative emulation as their brains develop. Supporting both - celebrating exact copies AND creative attempts - nurtures comprehensive learning and cognitive flexibility.",
                practicalTip: "Encourage both imitation and creativity. First: 'Watch me touch the circle. Now you try!' Praise exact copying. Then: 'Can you find another way to show me circle?' Celebrate creative solutions. This dual approach exercises both the imitation circuits and the problem-solving prefrontal cortex."
            },
            {
                day: 18,
                title: "Environmental Labeling: Surrounding Children with Words",
                content: "The brain learns language through repeated exposure in meaningful contexts. Environmental print - labels on objects throughout the home - creates constant, passive learning opportunities. Each time your child sees 'DOOR' on the door or 'CHAIR' on the chair, the visual word form area in the left fusiform gyrus strengthens its recognition. This bridges the gap between spoken and written language, laying groundwork for reading.",
                practicalTip: "Label 5-10 objects in each room at your child's eye level. Use large, clear letters. Point to labels during daily routines: 'Let's sit in the CHAIR' while touching the label. 'Time to open the DOOR.' This constant exposure builds automatic word recognition and connects spoken words to their written forms."
            },
            {
                day: 19,
                title: "Language Acquisition: The Critical Window for Learning",
                content: "The brain has a 'critical period' for language acquisition, roughly from birth to age 7, when neural circuits are maximally receptive to language input. During this window, Broca's area, Wernicke's area, and the arcuate fasciculus (the fiber bundle connecting them) are highly plastic. Rich language exposure during this period establishes strong neural infrastructure. The quantity AND quality of words children hear directly predicts their vocabulary size and later academic success.",
                practicalTip: "Talk to your child constantly - narrate your day, describe what you see, explain what you're doing. 'I'm washing the RED bowl. The water is warm. Now I'm drying it with a towel.' This running commentary floods developing language circuits with the rich input they need during this critical window of opportunity."
            },
            {
                day: 20,
                title: "Secure Attachment: The Foundation for All Learning",
                content: "Attachment - the emotional bond between child and caregiver - is regulated by the limbic system and profoundly affects all learning. Securely attached children have lower baseline cortisol (stress hormone) levels, allowing their hippocampus and prefrontal cortex to function optimally. They feel safe to explore, make mistakes, and try new things. The oxytocin released during warm interactions literally makes the brain more receptive to learning and memory formation.",
                practicalTip: "Make learning a bonding experience, not a test. Sit close, make eye contact, offer hugs after efforts. If your child gets frustrated, pause and connect: 'It's okay, we'll figure this out together.' This emotional safety net allows the brain to stay in learning mode rather than shifting to stress mode. Your relationship is the foundation everything else builds upon."
            }

        function validateParticipantId(id) {
            // Validate format: 5-digit number
            if (!id || id.length !== 5) {
                return { valid: false, message: 'Participant ID must be exactly 5 digits' };
            }

            const idNumber = parseInt(id);
            
            // Check if it's a number
            if (isNaN(idNumber)) {
                return { valid: false, message: 'Participant ID must contain only numbers' };
            }

            // Pattern: starts at 12000, increments by 8
            // Valid IDs: 12000, 12008, 12016, 12024, etc.
            // Formula: (id - 12000) must be divisible by 8 and >= 0
            
            if (idNumber < 12000) {
                return { valid: false, message: 'Invalid Participant ID' };
            }

            const offset = idNumber - 12000;
            
            if (offset % 8 !== 0) {
                return { valid: false, message: 'Invalid Participant ID' };
            }

            // Check reasonable upper limit (100,000 entries = 12000 + 8*100000 = 812000)
            if (idNumber > 812000) {
                return { valid: false, message: 'Invalid Participant ID' };
            }

            return { valid: true };
        }

        // Twinkle Twinkle Little Star melody (public domain) - for test
        const twinkleMelody = [

        // Note frequencies
        const noteFrequencies = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25

        function initAudioContext() {
            if (!audioContext) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContextClass();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return audioContext;
        }
        
        function initBackgroundMusicGain() {
            if (!backgroundMusicGain && audioContext) {
                backgroundMusicGain = audioContext.createGain();
                backgroundMusicGain.connect(audioContext.destination);
                backgroundMusicGain.gain.setValueAtTime(0.03, audioContext.currentTime); // Very soft
            }
            return backgroundMusicGain;
        }
        
        function playMusicBoxNote(frequency, duration, startTime, volume = 0.15, useBackgroundGain = false) {
            if (!audioContext) {
                console.error('No audio context!');
                return;
            }
            
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, startTime);
                
                // Add harmonic for sparkle
                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                oscillator2.type = 'sine';
                oscillator2.frequency.setValueAtTime(frequency * 2, startTime);
                
                // Envelope
                gainNode.gain.setValueAtTime(volume, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration * 0.8);
                
                gainNode2.gain.setValueAtTime(volume * 0.3, startTime);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, startTime + duration * 0.6);
                
                // Connect to appropriate destination
                const destination = useBackgroundGain && backgroundMusicGain ? backgroundMusicGain : audioContext.destination;
                
                oscillator.connect(gainNode);
                gainNode.connect(destination);
                oscillator2.connect(gainNode2);
                gainNode2.connect(destination);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + duration);
                oscillator2.start(startTime);
                oscillator2.stop(startTime + duration);
            } catch (error) {
                console.error('Error in playMusicBoxNote:', error);
            }
        }
        
        function playTwinkleTwinkle() {
            console.log('playTwinkleTwinkle called');
            
            try {
                // Initialize audio context - Safari uses webkitAudioContext
                if (!audioContext) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContextClass) {
                        showAppModal('Audio Not Supported', 'Your browser does not support Web Audio. Please try Chrome or Firefox.', 'warning');
                        return;
                    }
                    audioContext = new AudioContextClass();
                    console.log('AudioContext created:', audioContext.state);
                }
                
                // Resume if suspended (required by browsers after user interaction)
                if (audioContext.state === 'suspended') {
                    console.log('Resuming suspended audio context...');
                    audioContext.resume().then(() => {
                        console.log('AudioContext resumed:', audioContext.state);
                        playMelodyNotes();
                    });
                } else {
                    console.log('AudioContext state:', audioContext.state);
                    playMelodyNotes();
                }
                
            } catch (error) {
                console.error('Error in playTwinkleTwinkle:', error);
                showAppToast('Could not play audio: ' + error.message, 'error');
            }
        }

        function playMelodyNotes() {
            console.log('Playing melody notes...');
            
            // Update button state
            const playBtn = document.getElementById('playMusicBtn');
            if (playBtn) {
                playBtn.disabled = true;
                playBtn.innerHTML = `

                `;
                playBtn.style.background = 'rgba(75, 156, 211, 0.3)';
                playBtn.style.cursor = 'default';
            }
            
            state.audioSetup.musicPlaying = true;
            
            // Schedule all notes
            let currentTime = audioContext.currentTime + 0.1;
            console.log('Starting at time:', currentTime);
            
            twinkleMelody.forEach((noteData, index) => {
                const frequency = noteFrequencies[noteData.note];
                console.log(`Note ${index}: ${noteData.note} (${frequency}Hz) at ${currentTime}`);
                playMusicBoxNote(frequency, noteData.duration, currentTime, 0.4);
                currentTime += noteData.duration;
            });
            
            // Reset button after melody finishes
            const totalDuration = twinkleMelody.reduce((sum, n) => sum + n.duration, 0) * 1000;
            console.log('Total duration:', totalDuration, 'ms');
            
            // Clear any existing timeout
            if (testMusicTimeout) {
                clearTimeout(testMusicTimeout);
            }
            
            testMusicTimeout = setTimeout(() => {
                state.audioSetup.musicPlaying = false;
                testMusicTimeout = null;
                if (playBtn) {
                    playBtn.disabled = false;
                    playBtn.innerHTML = '🎵 Play Music';
                    playBtn.style.background = 'linear-gradient(135deg, #4B9CD3 0%, #7BAFD4 100%)';
                    playBtn.style.cursor = 'pointer';
                }
                console.log('Melody finished');
            }, totalDuration + 300);
        }
        
        // Stop test music immediately (for when user navigates away or enables background music)
        function stopTestMusic() {
            // Clear the completion timeout
            if (testMusicTimeout) {
                clearTimeout(testMusicTimeout);
                testMusicTimeout = null;
            }
            
            // Reset state
            state.audioSetup.musicPlaying = false;
            
            // Reset button if it exists
            const playBtn = document.getElementById('playMusicBtn');
            if (playBtn) {
                playBtn.disabled = false;
                playBtn.innerHTML = '🎵 Play Music';
                playBtn.style.background = 'linear-gradient(135deg, #4B9CD3 0%, #7BAFD4 100%)';
                playBtn.style.cursor = 'pointer';
            }
            
            // Note: We can't easily stop already-scheduled oscillators, but they will finish naturally
            // The key is preventing overlap by not starting background music until test finishes
            // or by stopping any new scheduling
            console.log('Test music stopped');
        }
        
        function playBackgroundMelodyLoop() {
            if (!state.audioSetup.musicEnabled || isMusicCurrentlyPlaying) return;
            
            try {
                // Initialize audio context
                initAudioContext();
                initBackgroundMusicGain();
                
                // Make sure gain is audible
                if (backgroundMusicGain) {
                    backgroundMusicGain.gain.setValueAtTime(0.03, audioContext.currentTime); // Very soft background
                }
                
                isMusicCurrentlyPlaying = true;
                
                function playLoop() {
                    if (!state.audioSetup.musicEnabled) {
                        isMusicCurrentlyPlaying = false;
                        return;
                    }
                    
                    // Make sure audio context is still valid
                    if (!audioContext || audioContext.state === 'closed') {
                        isMusicCurrentlyPlaying = false;
                        return;
                    }
                    
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    
                    let currentTime = audioContext.currentTime + 0.1;
                    backgroundMelody.forEach((noteData) => {
                        const frequency = noteFrequencies[noteData.note];
                        // Use background gain node, volume is controlled by the gain node
                        playMusicBoxNote(frequency, noteData.duration, currentTime, 0.5, true);
                        currentTime += noteData.duration;
                    });
                    
                    const totalDuration = backgroundMelody.reduce((sum, n) => sum + n.duration, 0) * 1000;
                    backgroundMusicInterval = setTimeout(playLoop, totalDuration + 1000); // Gap between loops
                }
                
                playLoop();
                
            } catch (error) {
                console.error('Error playing background music:', error);
                isMusicCurrentlyPlaying = false;
            }
        }
        
        function stopBackgroundMusic() {
            // Clear the loop timeout
            if (backgroundMusicInterval) {
                clearTimeout(backgroundMusicInterval);
                backgroundMusicInterval = null;
            }
            
            // Immediately silence the background music gain node
            if (backgroundMusicGain && audioContext) {
                backgroundMusicGain.gain.cancelScheduledValues(audioContext.currentTime);
                backgroundMusicGain.gain.setValueAtTime(0, audioContext.currentTime);
            }
            
            isMusicCurrentlyPlaying = false;
        }

            state.audioSetup.musicEnabled = !state.audioSetup.musicEnabled;

        async function requestMicrophonePermission() {

        function playPandaVoicePreview() {
            // Stop any currently playing audio
            if (currentPandaAudio) {

                currentPandaAudio.currentTime = 0;

            const previewText = "Hi there! I'm Panda. And I'm so excited, to learn with you today!";
            console.log('🐼 PANDA Voice Preview (ElevenLabs)');

            // Call ElevenLabs TTS via Netlify function
            fetch('/.netlify/functions/elevenlabs-tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: previewText })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('TTS request failed: ' + response.status);
                }
                return response.blob();
            })
            .then(blob => {
                const audioUrl = URL.createObjectURL(blob);
                currentPandaAudio = new Audio(audioUrl);
                currentPandaAudio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    currentPandaAudio = null;
                };
                currentPandaAudio.onerror = () => {
                    console.error('🐼 Audio playback error');
                    URL.revokeObjectURL(audioUrl);
                    currentPandaAudio = null;
                    showAppToast('Voice preview failed to play.', 'warning');
                };
                currentPandaAudio.play().catch(err => {
                    console.error('🐼 Audio play failed:', err.message);
                    showAppToast('Voice preview failed to play.', 'warning');
                });
            })
            .catch(err => {
                console.error('🐼 ElevenLabs TTS error:', err.message);
                showAppToast('Voice preview unavailable. Please try again.', 'warning');
            });

            logInteraction('panda_voice_preview_played');

                day: state.currentDay,

                tag: state.currentJournalTag || null,

            state.journalEntries.unshift(newEntry);

        async function exportJournal() {
            if (state.journalEntries.length === 0) {
                showAppToast('No journal entries to export yet.', 'info');
                return;
            }

            // Show loading state
            showAppToast('Generating PDF...', 'info');

            // Get the active child's name if available
            const selectedChild = state.children.find(c => c.id === state.activeChildId);
            const childName = selectedChild ? selectedChild.name : null;

            // Prepare entries data for the PDF generator
            const requestData = {
                participantId: state.userId,
                childName: childName,
                entries: state.journalEntries.map(entry => ({
                    day: entry.day,
                    timestamp: entry.timestamp,
                    text: entry.text,
                    tag: entry.tag || null
                }))
            };

            try {
                const response = await fetch('/.netlify/functions/export-journal-pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Failed to generate PDF');
                }

                // Get the PDF blob from response
                const pdfBlob = await response.blob();

                // Extract filename from Content-Disposition header or generate one
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = `notes-${childName || state.userId}-${new Date().toISOString().split('T')[0]}.pdf`;
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="?([^";\n]+)"?/);
                    if (filenameMatch && filenameMatch[1]) {
                        filename = filenameMatch[1];
                    }
                }

                // Create download link and trigger download
                const url = URL.createObjectURL(pdfBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                logInteraction('journal_exported', { entryCount: state.journalEntries.length, format: 'pdf' });
                showAppToast(`Journal exported as PDF! ${state.journalEntries.length} entries saved.`, 'success');
            } catch (error) {
                console.error('PDF export failed:', error);
                showAppToast('Failed to export journal. Please try again.', 'error');
            }
        }

        function emailJournal() {
            if (state.journalEntries.length === 0) {
