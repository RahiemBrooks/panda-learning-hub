                    gray: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzZCNzI4MCIvPjx0ZXh0IHg9IjEwMCIgeT0iMTE1IiBmb250LXNpemU9IjQ4IiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+QmDwvdGV4dD48L3N2Zz4=',
                    brown: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iIzkyNDAwRSIvPjx0ZXh0IHg9IjEwMCIgeT0iMTE1IiBmb250LXNpemU9IjQ4IiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+ngTwvdGV4dD48L3N2Zz4='
                };
                return `<img src="${colorImages[item]}" alt="${item}" style="width: 100%; height: 140px; object-fit: contain; border-radius: 12px;" />`;
            } else if (subject === 'shapes') {
                const shapes = {
                    circle: '<div style="width: 100px; height: 100px; background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); border-radius: 50%; margin: 0 auto; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);"></div>',
                    square: '<div style="width: 100px; height: 100px; background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); margin: 0 auto; border-radius: 8px; box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);"></div>',
                    rectangle: '<div style="width: 130px; height: 80px; background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%); margin: 0 auto; border-radius: 8px; box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);"></div>',
                    triangle: '<div style="width: 0; height: 0; border-left: 55px solid transparent; border-right: 55px solid transparent; border-bottom: 95px solid #eab308; margin: 0 auto; filter: drop-shadow(0 8px 12px rgba(234, 179, 8, 0.4));"></div>',
                    sphere: '<div style="width: 100px; height: 100px; border-radius: 50%; margin: 0 auto; background: radial-gradient(circle at 30% 30%, #93c5fd, #1e40af); box-shadow: 0 8px 20px rgba(30, 64, 175, 0.4);"></div>',
                    oval: '<div style="width: 120px; height: 75px; background: linear-gradient(135deg, #a855f7 0%, #c084fc 100%); margin: 0 auto; border-radius: 50%; box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);"></div>',
                    star: '<div style="font-size: 5rem; text-align: center; filter: drop-shadow(0 4px 8px rgba(250, 204, 21, 0.5));">⭐</div>',
                    heart: '<div style="font-size: 5rem; text-align: center; filter: drop-shadow(0 4px 8px rgba(239, 68, 68, 0.5));">❤️</div>'
                };
                return shapes[item] || '';
            } else if (subject === 'numbers') {
                return `<div style="font-size: 5rem; font-weight: 700; text-align: center; background: linear-gradient(135deg, #4B9CD3 0%, #7BAFD4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none; filter: drop-shadow(0 4px 8px rgba(75, 156, 211, 0.3));">${item}</div>`;
            }
            return '';
        }

        function selectAnswer(selectedItem) {
            const subject = state.currentSubject;
            const items = Object.keys(state.learningData[state.activeChildId][subject]).filter(i => !state.learningData[state.activeChildId][subject][i].mastered);
            const correctItem = state.currentLesson || items[0];
            
            const isCorrect = selectedItem === correctItem;
            checkAnswer(isCorrect);
        }

        function askForHelp() {
            const subject = state.currentSubject;
            const items = Object.keys(state.learningData[state.activeChildId][subject]).filter(i => !state.learningData[state.activeChildId][subject][i].mastered);
            const item = state.currentLesson || items[0];
            const teachingPrompt = teachingGuides[subject]?.prompts[item];
            
            if (teachingPrompt) {
                speakText(`Here's how to teach ${item}. ${teachingPrompt.tips}`);
            }
        }
            const subject = state.currentSubject;

        function checkAnswer(isCorrect) {
            const subject = state.currentSubject;
            const items = Object.keys(state.learningData[state.activeChildId][subject]).filter(i => !state.learningData[state.activeChildId][subject][i].mastered);
            const item = state.currentLesson || items[0];
            const itemData = state.learningData[state.activeChildId][subject][item];
            
            itemData.attempts++;
            
            if (isCorrect) {
                itemData.correct++;
                itemData.consecutiveCorrect++;
                
                // Voice feedback for correct answers
                if (itemData.consecutiveCorrect >= 3) {
                    itemData.mastered = true;
                    speakText(`Amazing! You mastered ${item}! That's wonderful!`);
                    
                    // Celebration alert
                    setTimeout(() => {
                        alert(`🎉 MASTERED: ${item}!\n\n${state.children.find(c => c.id === state.activeChildId).name} has mastered this item!\n\nGreat teaching!`);
                        state.currentLesson = null;
                        render();
                    }, 100);
                } else {
                    const remaining = 3 - itemData.consecutiveCorrect;
                    speakText(`Correct! Great job! Only ${remaining} more in a row!`);
                }
            } else {
                itemData.incorrect++;
                const previousStreak = itemData.consecutiveCorrect;
                itemData.consecutiveCorrect = 0;
                
                // Scaffolding feedback based on struggle
                if (itemData.incorrect === 1) {
                    speakText(`Not quite. This is ${item}. Let's try again together!`);
                } else if (itemData.incorrect === 2) {
                    speakText(`Let me help you. This is ${item}. Can you say ${item} with me?`);
                    
                    // Show hint if in teacher mode
                    if (state.teacherMode) {
                        const teachingPrompt = teachingGuides[subject]?.prompts[item];
                        if (teachingPrompt && teachingPrompt.hints[0]) {
                            setTimeout(() => {
                                speakText(teachingPrompt.hints[0]);
                            }, 2000);
                        }
                    }
                } else {
                    speakText(`That's okay! Learning takes practice. This is ${item}. Let's keep trying!`);
                }
                
                if (previousStreak > 0) {
                    speakText(`We'll get back to ${previousStreak} in a row. Keep practicing!`);
                }
            }
            
            logInteraction('learning_attempt', {
                childId: state.activeChildId,
                subject: subject,
                item: item,
                correct: isCorrect,
                consecutiveCorrect: itemData.consecutiveCorrect,
                attempts: itemData.attempts,
                mastered: itemData.mastered
            });
            
            render();
        }

        function setActiveTab(tab) {
            state.activeTab = tab;
            render();
        }

        function toggleSidebar() {
            state.sidebarOpen = !state.sidebarOpen;
            render();
        }

        function closeSidebar() {
            state.sidebarOpen = false;
        }

        function startNewLesson() {
            const lessons = [
                { type: 'color', value: 'red', question: 'Can you find something RED?', image: '🍎' },
                { type: 'color', value: 'blue', question: 'Show me something BLUE!', image: '💙' },
                { type: 'color', value: 'yellow', question: 'What color is this? YELLOW!', image: '🌟' },
                { type: 'color', value: 'green', question: 'Can you spot something GREEN?', image: '🌿' },
                { type: 'shape', value: 'circle', question: 'This is a CIRCLE! Round like a ball!', image: '⚪' },
                { type: 'shape', value: 'square', question: 'Look at this SQUARE! It has 4 sides!', image: '◻️' },
                { type: 'shape', value: 'triangle', question: 'Here is a TRIANGLE! It has 3 pointy corners!', image: '🔺' }
            ];
            const randomLesson = lessons[Math.floor(Math.random() * lessons.length)];
            state.currentQuestion = randomLesson;
            state.feedback = '';
            logInteraction('lesson_started', { lesson: randomLesson });
            speakText(randomLesson.question);
        }

        function handleAnswer(isCorrect) {
            state.childProgress.total++;
            if (isCorrect) {
                state.childProgress.correct++;
                const praises = [
                    'Amazing! You did it! 🎉',
                    'Wow! Great job! ⭐',
                    'Perfect! You are so smart! 🌟',
                    'Excellent work! 🎊',
                    'That is right! High five! ✋'
                ];
                const praise = praises[Math.floor(Math.random() * praises.length)];
                state.feedback = praise;
                speakText(praise);
                logInteraction('correct_answer', { lesson: state.currentQuestion });
                
                setTimeout(() => {
                    startNewLesson();
                    render();
                }, 3000);
            } else {
                const encouragements = [
                    'Not quite! Let us try again together! 💪',
                    'That is okay! Let us look closely! 👀',
                    'Good try! Want to try once more? 🙂'
                ];
                const encouragement = encouragements[Math.floor(Math.random() * encouragements.length)];
                state.feedback = encouragement;
                speakText(encouragement);
                logInteraction('incorrect_answer', { lesson: state.currentQuestion });
            }
            render();
        }

        function handleVoiceInput() {
            state.isListening = true;
            render();
            speakText('Tell me your answer!');
            
            setTimeout(() => {
                state.isListening = false;
                const isCorrect = Math.random() > 0.3;
                handleAnswer(isCorrect);
            }, 2000);
        }

        // ============================================================================
        // MAIN RENDER FUNCTION
        // ============================================================================
        let previousView = null; // Track view changes
        
        function render() {
            const app = document.getElementById('app');
            
            // Stop all speech when view changes
            if (previousView !== null && previousView !== state.currentView) {
                stopAllSpeech();
            }
            previousView = state.currentView;
            
            if (state.currentView === 'opening') {
                app.innerHTML = renderOpeningPage();
            } else if (state.currentView === 'consent') {
                app.innerHTML = renderConsentForm();
            } else if (state.currentView === 'participantIdEntry') {
                app.innerHTML = renderParticipantIdEntry();
            } else if (state.currentView === 'audioSetup') {
                app.innerHTML = renderAudioSetup();
            } else if (state.currentView === 'roleSelection') {
                app.innerHTML = renderRoleSelection();
            } else if (state.currentView === 'parentDashboard') {
                app.innerHTML = renderParentDashboard();
                
                // Render tab content
                const tabContent = document.getElementById('tabContent');
                if (state.activeTab === 'coaching') {
                    tabContent.innerHTML = renderCoachingTips();
                } else if (state.activeTab === 'labeling') {
                    tabContent.innerHTML = renderLabelingGuide();
                } else if (state.activeTab === 'calendar') {
                    tabContent.innerHTML = '<div class="text-center p-8 text-lg" style="color: #cbd5e1;">📅 Learning Calendar - Interactive 20-day calendar coming soon</div>';
                } else if (state.activeTab === 'journal') {
                    tabContent.innerHTML = renderJournal();
                } else if (state.activeTab === 'resources') {
                    tabContent.innerHTML = renderResources();
                } else if (state.activeTab === 'surveys') {
                    tabContent.innerHTML = '<div class="text-center p-8 text-lg" style="color: #cbd5e1;">📋 Surveys - Qualtrics integration ready for deployment</div>';
                } else if (state.activeTab === 'analytics') {
                    tabContent.innerHTML = '<div class="text-center p-8 text-lg" style="color: #cbd5e1;">📊 Analytics - Progress tracking dashboard coming soon</div>';
                }
            } else if (state.currentView === 'childManagement') {
                app.innerHTML = renderChildManagement();
            } else if (state.currentView === 'assessment') {
                app.innerHTML = renderAssessment();
            } else if (state.currentView === 'childLearning') {
                app.innerHTML = renderChildLearning();
            } else if (state.currentView === 'childTutor') {
                app.innerHTML = renderChildTutor();
            } else if (state.currentView === 'colorQuest') {
                app.innerHTML = renderColorQuest();
            }
            
            // Add audio controls overlay on all pages after setup is complete
            if (state.audioSetup.setupComplete) {
                // Remove existing controls if any
                const existingControls = document.getElementById('audioControlsOverlay');
                if (existingControls) {
                    existingControls.remove();
                }
                
                // Add new controls
                const controlsDiv = document.createElement('div');
                controlsDiv.id = 'audioControlsOverlay';
                controlsDiv.innerHTML = renderAudioControls();
                document.body.appendChild(controlsDiv);
            }
        }

        // Initialize app
        // Load speech synthesis voices
        if (window.speechSynthesis) {
            // Voices load asynchronously, so we trigger loading early
            window.speechSynthesis.getVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.getVoices();
                };
            }
        }
        
        render();
    </script>
